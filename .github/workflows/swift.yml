name: Swift

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  license:
    name: License Compliance
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
      - name: Check license compliance
        run: brew update && brew install reuse && reuse lint

  macos:
    name: macOS 
    runs-on: macos-26
    continue-on-error: false
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - name: Set Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "TAG_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - run: swift --version
      - name: Test debug
        run: swift test -q -c debug
        timeout-minutes: 60
      - name: Build release
        run: swift build -c release
        timeout-minutes: 60

  linux:
    name: Linux ${{ matrix.arch }} ${{ matrix.version }} ${{ matrix.static && 'Static' || '' }}
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    continue-on-error: ${{ matrix.continueOnError }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            version: "6.2"
            static: false
            container: "swift:6.2"
            continueOnError: false
          - arch: x86_64
            version: "6.2"
            static: true
            container: "swift:6.2"
            continueOnError: false
          - arch: arm64
            version: "6.2"
            static: false
            container: "swift:6.2"
            continueOnError: false
          - arch: arm64
            version: "6.2"
            static: true
            container: "swift:6.2"
            continueOnError: false
    steps:
      - uses: actions/checkout@v5
      - name: Set Tag Version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "TAG_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Install QEMU
        if: matrix.arch == 'arm64'
        run: apt-get update && apt-get install -y qemu-user-static
      - name: Install Static SDK
        if: matrix.static
        run: |
          swift sdk install https://download.swift.org/swift-6.2-release/static-sdk/swift-6.2-RELEASE/swift-6.2-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz --checksum d2225840e592389ca517bbf71652f7003dbf45ac35d1e57d98b9250368769378
      - run: |
          swift --version
          swift sdk list
      - name: Test debug
        run: |
          SDK_ARG=""
          if [ "${{ matrix.static }}" == "true" ]; then
            SDK_ARG="--swift-sdk ${{ matrix.arch == 'arm64' && 'aarch64' || 'x86_64' }}-swift-linux-musl"
          fi
          swift test -q -c debug $SDK_ARG
        timeout-minutes: 60
      - name: Test release
        run: |
          SDK_ARG=""
          if [ "${{ matrix.static }}" == "true" ]; then
            SDK_ARG="--swift-sdk ${{ matrix.arch == 'arm64' && 'aarch64' || 'x86_64' }}-swift-linux-musl"
          fi
          swift test -q -c release $SDK_ARG
        timeout-minutes: 60
